<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รดน้ำขอพรผู้บริหาร สพป.พิษณุโลก เขต 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(180deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --blue-deep: #001ba0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Sarabun', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* รูปภาพอยู่เลเยอร์ล่างสุด */
        .bg-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        /* ปุ่มอยู่เลเยอร์ที่สูงกว่ารูปภาพ แต่อยู่ตำแหน่งเดิมด้านล่าง */
        .btn-wrapper {
            position: absolute;
            bottom: 10%; /* ตำแหน่งด้านล่างเหมือนเดิม */
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            z-index: 99; /* เลเยอร์สูงกว่ารูป */
        }
        
        .btn-main {
            background: var(--gold-gradient);
            color: #403010;
            border: 2px solid #aa771c;
            padding: 18px 0;
            width: 85%;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .btn-main:active { transform: scale(0.95); }

        .blessing-overlay {
            position: absolute;
            top: 15%;
            left: 5%;
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            border: 4px solid #bf953f;
            text-align: center;
            font-size: 1.2rem;
            color: #222;
            display: none;
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            line-height: 1.6;
        }

        .vdo-container { width: 100%; height: 100%; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: auto; }

        .step-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="page1" class="page active">
        <img src="https://i.ibb.co/qYvnnpC0/2.png" class="bg-img">
        <div class="btn-wrapper">
            <button class="btn-main" onclick="goToPage(2)">✓ กดเข้าร่วมพิธีรดน้ำ</button>
        </div>
    </div>

    <div id="page2" class="page">
        <img src="https://i.ibb.co/nMgR2nJV/3.png" class="bg-img">
        <div class="btn-wrapper">
            <button class="btn-main" onclick="startCeremony()" style="background: var(--blue-deep); color: white; border-color: #fff;">
                ไปรดน้ำท่านแรก >
            </button>
